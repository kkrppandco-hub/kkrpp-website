<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>KKRPP &amp; Co. | Content Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Jost',sans-serif;background:#fff7f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .loader{text-align:center;padding:3rem;}
    .loader-logo{width:80px;height:80px;background:linear-gradient(135deg,#c05e20,#e07840);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:2rem;font-weight:700;color:#fff;margin:0 auto 1.5rem;box-shadow:0 8px 24px rgba(192,94,32,0.3);}
    .loader h1{font-family:Georgia,serif;font-size:1.6rem;font-weight:600;color:#7a3b1e;margin-bottom:0.4rem;}
    .loader p{font-size:0.88rem;color:#7a6055;}
    .spinner{width:32px;height:32px;border:3px solid #f0d8c8;border-top-color:#c05e20;border-radius:50%;animation:spin 0.8s linear infinite;margin:1.5rem auto 0;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader-logo">CA</div>
    <h1>KKRPP &amp; Co.</h1>
    <p>Loading Content Manager&hellip;</p>
    <div class="spinner"></div>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
