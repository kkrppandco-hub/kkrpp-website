backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://www.kkrppandco.com
display_url: https://www.kkrppandco.com
logo_url: https://www.kkrppandco.com/images/logo.png

collections:
  - name: "posts"
    label: "Insights & Articles"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "insights/{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Make it keyword-rich e.g. How to file GST returns in Bangalore 2025"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        default: ""
        date_format: "DD MMM YYYY"
        time_format: false

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Income Tax", value: "tax" }
          - { label: "GST", value: "gst" }
          - { label: "Audit", value: "audit" }
          - { label: "NRI Services", value: "nri" }
          - { label: "Business Advisory", value: "advisory" }
          - { label: "General", value: "general" }

      - label: "Author"
        name: "author"
        widget: "string"
        default: "KKRPP & Co."

      - label: "Meta Description"
        name: "description"
        widget: "text"
        hint: "150-160 characters for Google search results"
        pattern: ['.{50,160}', "Must be between 50 and 160 characters"]

      - label: "Focus Keyword"
        name: "keyword"
        widget: "string"
        hint: "Main keyword e.g. GST filing Bangalore"
        required: false

      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Optional cover image for the article"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write your full article here"

      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
        hint: "Uncheck to save as draft"
